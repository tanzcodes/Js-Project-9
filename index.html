<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KE Bill Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2 style="color: blue;">KE Bill Calculator</h2>
        
        <input type="text" id="userName" placeholder="Enter Your Name">
        <input type="number" id="units" placeholder="Enter Units">
        
        <button onclick="calculateBill()">Calculate Bill</button>

        <div id="invoice" class="invoice-box" style="display: none;">
            <h3>K-ELECTRIC INVOICE</h3>
            <p>Customer: <span id="resName"></span></p>
            <p>Units Consumed: <span id="resUnits"></span></p>
            <p>Rate applied: Rs. 22</p>
            <hr>
            <p>Charges: Rs. <span id="resCharges"></span></p>
            <p>Tax (15%): Rs. <span id="resTax"></span></p>
            <h3 style="color: blue;">Net Amount: Rs. <span id="resTotal"></span></h3>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
